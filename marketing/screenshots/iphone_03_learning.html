<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .title { font-size:48px; font-weight:700; color:#2f4733; padding:10px 60px 0; }
  .content { padding:0 60px; display:flex; flex-direction:column; align-items:center; }
  .ring { margin-top:80px; width:600px; height:600px; border-radius:50%;
          background:conic-gradient(#4f6048 0 12%, #e6e9dd 12% 100%);
          display:flex; align-items:center; justify-content:center; }
  .ring .inner { width:470px; height:470px; border-radius:50%; background:#fbfbf9;
                 display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .pct { font-size:150px; font-weight:800; color:#2f4733; line-height:1; }
  .pctlbl { font-size:44px; color:#6e7468; margin-top:14px; }
  .stats { display:flex; gap:30px; margin-top:80px; width:100%; }
  .stat { flex:1; padding:44px 0; text-align:center; }
  .statnum { font-size:72px; font-weight:800; color:#2f4733; }
  .statlbl { font-size:32px; color:#6e7468; margin-top:10px; }
  .seclabel { align-self:flex-start; font-size:34px; font-weight:700; color:#2a2e28; margin:70px 0 28px; }
  .chips { display:flex; flex-wrap:wrap; gap:24px; }
  .chip { display:flex; align-items:center; gap:16px; background:#eef1e7; color:#3a4034;
          border-radius:40px; padding:24px 38px; font-size:36px; font-weight:500; }
  .chip .ck { color:#4f6048; font-size:40px; }
</style></head>
<body class="light">
  <div class="headline">Your journey<br>through the Qur'an</div>
  <div class="sub">Every gate moves you forward — see how far you've come.</div>
  <div class="phone"><div class="screen">
    <div class="island"></div>
    <div class="statusbar"><span>9:41</span><span>􀙇 􀛨 􀋨</span></div>
    <div class="title">My Learning</div>
    <div class="content">
      <div class="ring"><div class="inner">
        <div class="pct">12%</div>
        <div class="pctlbl">of the Qur'an</div>
      </div></div>
      <div class="stats">
        <div class="stat card"><div class="statnum">748</div><div class="statlbl">Ayahs read</div></div>
        <div class="stat card"><div class="statnum">9</div><div class="statlbl">Surahs done</div></div>
      </div>
      <div class="seclabel">Completed Surahs</div>
      <div class="chips">
        <span class="chip"><span class="ck">✓</span>Al-Fatiha</span>
        <span class="chip"><span class="ck">✓</span>Al-Ikhlas</span>
        <span class="chip"><span class="ck">✓</span>Al-Falaq</span>
        <span class="chip"><span class="ck">✓</span>An-Nas</span>
        <span class="chip"><span class="ck">✓</span>Al-Kawthar</span>
      </div>
    </div>
  </div></div>
</body></html>
