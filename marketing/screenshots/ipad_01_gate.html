<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared_ipad.css">
<style>
  .gatebody { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 140px; }
  .gatetag { font-size:36px; font-weight:600; letter-spacing:5px; text-transform:uppercase; color:#7c8a6e; }
  .ayah { margin-top:80px; font-family:'Amiri',serif; font-size:164px; line-height:1.85; color:#2a2e28; text-align:center; direction:rtl; }
  .translation { margin-top:64px; font-size:62px; line-height:1.55; color:#5b6157; text-align:center; max-width:1180px; }
  .ref { margin-top:42px; font-size:42px; color:#9aa08f; font-style:italic; }
  .ring { margin-top:130px; width:300px; height:300px; border-radius:50%; border:18px solid #e6e9dd;
          border-top-color:#4f6048; border-right-color:#4f6048; transform:rotate(35deg);
          display:flex; align-items:center; justify-content:center; }
  .ring span { transform:rotate(-35deg); font-size:84px; font-weight:700; color:#2f4733; }
  .unlock { margin-top:96px; width:960px; background:#2f4733; color:#fff; text-align:center; padding:62px; border-radius:50px; font-size:58px; font-weight:600; }
</style></head>
<body class="light">
  <div class="headline">Pause before you scroll</div>
  <div class="sub">A moment with the Qur'an before social media opens.</div>
  <div class="pad"><div class="screen">
    <div class="cam"></div>
    <div class="statusbar"><span>9:41</span><span>iPad&nbsp;&nbsp;􀙇 􀛨 􀋨</span></div>
    <div class="gatebody">
      <div class="gatetag">Set your niyyah</div>
      <div class="ayah">إِنَّ مَعَ الْعُسْرِ يُسْرًا</div>
      <div class="translation">"Indeed, with hardship comes ease."</div>
      <div class="ref">Surah Ash-Sharh · 94:6</div>
      <div class="ring"><span>2:13</span></div>
      <div class="unlock">Continue to Instagram</div>
    </div>
  </div></div>
</body></html>
