<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared_ipad.css">
<style>
  .title { font-size:58px; font-weight:700; color:#e3c98f; padding:14px 80px 0; }
  .body { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 80px 60px; }
  .dialwrap { position:relative; width:920px; height:920px; }
  .dial { position:absolute; inset:0; border-radius:50%; border:4px solid #285038;
          background:radial-gradient(circle at 50% 40%, #12342479 0%, #0c2019 70%);
          box-shadow:inset 0 0 100px rgba(0,0,0,.5); }
  .ticks { position:absolute; inset:34px; border-radius:50%; }
  .card-pt { position:absolute; left:50%; transform:translateX(-50%); font-size:50px; font-weight:700; color:#b3aa92; }
  .pt-n { top:22px; color:#e3c98f; } .pt-s { bottom:22px; }
  .card-pt.pt-e { top:50%; left:auto; right:30px; transform:translateY(-50%); }
  .card-pt.pt-w { top:50%; left:30px; transform:translateY(-50%); }
  .rotor { position:absolute; inset:0; transform:rotate(138deg); }
  .ray { position:absolute; left:50%; top:130px; width:12px; height:260px; margin-left:-6px;
         background:linear-gradient(rgba(216,184,120,0), #D8B878); border-radius:8px; }
  .kaaba { position:absolute; left:50%; top:-8px; transform:translateX(-50%) rotate(-138deg);
           width:150px; height:150px; border-radius:34px; background:#1c130b; border:4px solid #D8B878;
           display:flex; align-items:center; justify-content:center; font-size:88px; }
  .hub { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; }
  .deg { font-size:168px; font-weight:800; color:#e3c98f; line-height:1; }
  .deglbl { font-size:50px; color:#b3aa92; margin-top:14px; }
  .meta { margin-top:90px; width:100%; max-width:1180px; padding:50px 56px; display:flex; align-items:center; gap:34px; }
  .meta .pin { font-size:66px; }
  .meta .mtext { font-size:48px; color:#ece6d6; font-weight:600; }
  .meta .msub { font-size:40px; color:#b3aa92; margin-top:8px; }
</style></head>
<body class="dark">
  <div class="headline">Find the Qibla, wherever you are</div>
  <div class="sub">A precise compass to the Kaaba.</div>
  <div class="pad"><div class="screen">
    <div class="cam"></div>
    <div class="statusbar"><span>9:41</span><span>iPad&nbsp;&nbsp;􀙇 􀛨 􀋨</span></div>
    <div class="title">Qibla</div>
    <div class="body">
      <div class="dialwrap">
        <div class="dial"></div>
        <div class="ticks">
          <span class="card-pt pt-n">N</span>
          <span class="card-pt pt-e">E</span>
          <span class="card-pt pt-s">S</span>
          <span class="card-pt pt-w">W</span>
        </div>
        <div class="rotor">
          <div class="ray"></div>
          <div class="kaaba">🕋</div>
        </div>
        <div class="hub">
          <div class="deg">138°</div>
          <div class="deglbl">to the Kaaba</div>
        </div>
      </div>
      <div class="meta card">
        <span class="pin">📍</span>
        <div><div class="mtext">Aligned with Makkah</div>
        <div class="msub">Hold flat and turn slowly</div></div>
      </div>
    </div>
  </div></div>
</body></html>
