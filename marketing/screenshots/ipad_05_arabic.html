<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared_ipad.css">
<style>
  .headline { font-family:'Amiri',serif; letter-spacing:0; }
  .body { flex:1; padding:30px 0; }
  .greet { font-family:'Amiri',serif; font-size:90px; color:#e3c98f; margin-top:34px; }
  .greetsub { font-size:50px; color:#b3aa92; margin-top:12px; font-family:'Amiri',serif; }
  .pbar { margin-top:56px; display:flex; justify-content:space-between; align-items:center;
          background:#14342479; border:2px solid #20402f; border-radius:40px; padding:42px 50px;
          font-size:48px; color:#e3c98f; font-weight:600; font-family:'Amiri',serif; }
  .pbar .hijri { color:#9aa890; font-weight:500; font-size:44px; }
  .trk { margin-top:48px; padding:56px 54px; }
  .trkhead { display:flex; justify-content:space-between; align-items:center; }
  .trktitle { font-size:56px; font-weight:700; color:#ece6d6; font-family:'Amiri',serif; }
  .trkcount { font-size:56px; font-weight:800; color:#e3c98f; }
  .row5 { display:flex; justify-content:space-between; margin-top:56px; }
  .pcell { display:flex; flex-direction:column; align-items:center; gap:24px; font-size:42px; color:#9aa890; font-family:'Amiri',serif; }
  .dot { width:140px; height:140px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:62px; }
  .dot.on { background:#D8B878; color:#0c2019; }
  .dot.off { border:5px solid #2c5240; color:#3f6b50; }
  .pcell.on { color:#e3c98f; font-weight:700; }
  .stats { display:flex; gap:40px; margin-top:52px; }
  .stat { flex:1; padding:52px 0; text-align:center; }
  .statnum { font-size:84px; font-weight:800; color:#e3c98f; }
  .statlbl { font-size:42px; color:#9aa890; margin-top:12px; font-family:'Amiri',serif; }
</style></head>
<body class="dark">
  <div class="headline">التطبيق بالكامل باللغة العربية</div>
  <div class="sub">واجهة عربية أصيلة، من اليمين إلى اليسار.</div>
  <div class="pad"><div class="screen">
    <div class="cam"></div>
    <div class="statusbar"><span>٩:٤١</span><span>iPad&nbsp;&nbsp;􀙇 􀛨 􀋨</span></div>
    <div class="appbar"><span class="brand">نِيّة</span><span class="appicons">􀎶&nbsp;&nbsp;􀊃</span></div>
    <div class="body"><div class="col">
      <div class="greet">السلام عليكم</div>
      <div class="greetsub">اضبط نيّتك لهذا اليوم.</div>
      <div class="pbar"><span>☾&nbsp;&nbsp;العصر بعد ساعة و ١٢ دقيقة</span><span class="hijri">١٨ ذو الحجة</span></div>
      <div class="trk card">
        <div class="trkhead"><span class="trktitle">صلوات اليوم</span><span class="trkcount">٣/٥</span></div>
        <div class="row5">
          <div class="pcell on"><div class="dot on">✓</div>الفجر</div>
          <div class="pcell on"><div class="dot on">✓</div>الظهر</div>
          <div class="pcell on"><div class="dot on">✓</div>العصر</div>
          <div class="pcell"><div class="dot off">☾</div>المغرب</div>
          <div class="pcell"><div class="dot off">☾</div>العشاء</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat card"><div class="statnum">٢</div><div class="statlbl">اليوم</div></div>
        <div class="stat card"><div class="statnum">١٤ د</div><div class="statlbl">القراءة</div></div>
        <div class="stat card"><div class="statnum">٧</div><div class="statlbl">التتابع</div></div>
      </div>
    </div></div>
  </div></div>
</body></html>
