<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .content { padding:0 60px; display:flex; flex-direction:column; }
  .greet { font-family:'Amiri',serif; font-size:66px; color:#2f4733; margin-top:24px; }
  .greetsub { font-size:40px; color:#6e7468; margin-top:6px; }
  .pbar { margin-top:40px; display:flex; justify-content:space-between; align-items:center;
          background:#eef1e7; border-radius:34px; padding:34px 40px; font-size:38px; color:#4f6048; font-weight:600; }
  .pbar .hijri { color:#9aa08f; font-weight:500; font-size:34px; }
  .trk { margin-top:36px; padding:44px 40px; }
  .trkhead { display:flex; justify-content:space-between; align-items:center; }
  .trktitle { font-size:42px; font-weight:600; color:#2a2e28; }
  .trkcount { font-size:42px; font-weight:800; color:#4f6048; }
  .row5 { display:flex; justify-content:space-between; margin-top:44px; }
  .pcell { display:flex; flex-direction:column; align-items:center; gap:18px; font-size:30px; color:#6e7468; }
  .dot { width:104px; height:104px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:48px; }
  .dot.on { background:#4f6048; color:#fff; }
  .dot.off { border:4px solid #cdd4c0; color:#a9b199; }
  .pcell.on { color:#4f6048; font-weight:600; }
  .stats { display:flex; gap:30px; margin-top:40px; }
  .stat { flex:1; padding:40px 0; text-align:center; }
  .statnum { font-size:64px; font-weight:800; color:#2f4733; }
  .statlbl { font-size:32px; color:#6e7468; margin-top:8px; }
</style></head>
<body class="light">
  <div class="headline">Track your five<br>daily prayers</div>
  <div class="sub">A gentle home for your day's worship.</div>
  <div class="phone"><div class="screen">
    <div class="island"></div>
    <div class="statusbar"><span>9:41</span><span>􀙇 􀛨 􀋨</span></div>
    <div class="appbar"><span class="brand">Niyyah</span><span class="appicons">􀎶&nbsp;&nbsp;􀊃</span></div>
    <div class="content">
      <div class="greet">Assalamu alaykum</div>
      <div class="greetsub">Set your intention for today.</div>
      <div class="pbar"><span>☀&nbsp;&nbsp;Asr in 1h 12m</span><span class="hijri">18 Dhul-Hijjah</span></div>
      <div class="trk card">
        <div class="trkhead"><span class="trktitle">Today's Prayers</span><span class="trkcount">3/5</span></div>
        <div class="row5">
          <div class="pcell on"><div class="dot on">✓</div>Fajr</div>
          <div class="pcell on"><div class="dot on">✓</div>Dhuhr</div>
          <div class="pcell on"><div class="dot on">✓</div>Asr</div>
          <div class="pcell"><div class="dot off">☾</div>Maghrib</div>
          <div class="pcell"><div class="dot off">☾</div>Isha</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat card"><div class="statnum">2</div><div class="statlbl">Today</div></div>
        <div class="stat card"><div class="statnum">14m</div><div class="statlbl">Reading</div></div>
        <div class="stat card"><div class="statnum">7</div><div class="statlbl">Streak</div></div>
      </div>
    </div>
  </div></div>
</body></html>
