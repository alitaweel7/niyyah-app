<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .title { font-size:48px; font-weight:700; color:#e3c98f; padding:10px 60px 0; }
  .content { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:0 60px 40px; }
  .dialwrap { position:relative; width:700px; height:700px; }
  .dial { position:absolute; inset:0; border-radius:50%; border:3px solid #285038;
          background:radial-gradient(circle at 50% 40%, #12342479 0%, #0c2019 70%);
          box-shadow:inset 0 0 80px rgba(0,0,0,.5); }
  .ticks { position:absolute; inset:26px; border-radius:50%; }
  .card-pt { position:absolute; left:50%; transform:translateX(-50%); font-size:40px; font-weight:700; color:#b3aa92; }
  .pt-n { top:18px; color:#e3c98f; } .pt-s { bottom:18px; }
  .card-pt.pt-e { top:50%; left:auto; right:24px; transform:translateY(-50%); }
  .card-pt.pt-w { top:50%; left:24px; transform:translateY(-50%); }
  .rotor { position:absolute; inset:0; transform:rotate(138deg); }
  .ray { position:absolute; left:50%; top:96px; width:10px; height:200px; margin-left:-5px;
         background:linear-gradient(rgba(216,184,120,0), #D8B878); border-radius:6px; }
  .kaaba { position:absolute; left:50%; top:-6px; transform:translateX(-50%) rotate(-138deg);
           width:120px; height:120px; border-radius:28px; background:#1c130b; border:3px solid #D8B878;
           display:flex; align-items:center; justify-content:center; font-size:70px; }
  .hub { position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); text-align:center; }
  .deg { font-size:128px; font-weight:800; color:#e3c98f; line-height:1; }
  .deglbl { font-size:38px; color:#b3aa92; margin-top:10px; }
  .meta { margin-top:70px; width:100%; padding:40px 46px; display:flex; align-items:center; gap:28px; }
  .meta .pin { font-size:54px; }
  .meta .mtext { font-size:38px; color:#ece6d6; font-weight:600; }
  .meta .msub { font-size:32px; color:#b3aa92; margin-top:6px; }
</style></head>
<body class="dark">
  <div class="headline">Find the Qibla,<br>wherever you are</div>
  <div class="sub">A precise compass to the Kaaba.</div>
  <div class="phone"><div class="screen">
    <div class="island"></div>
    <div class="statusbar"><span>9:41</span><span>􀙇 􀛨 􀋨</span></div>
    <div class="title">Qibla</div>
    <div class="content">
      <div class="dialwrap">
        <div class="dial"></div>
        <div class="ticks">
          <span class="card-pt pt-n">N</span>
          <span class="card-pt pt-e">E</span>
          <span class="card-pt pt-s">S</span>
          <span class="card-pt pt-w">W</span>
        </div>
        <div class="rotor">
          <div class="ray"></div>
          <div class="kaaba">🕋</div>
        </div>
        <div class="hub">
          <div class="deg">138°</div>
          <div class="deglbl">to the Kaaba</div>
        </div>
      </div>
      <div class="meta card">
        <span class="pin">📍</span>
        <div><div class="mtext">Aligned with Makkah</div>
        <div class="msub">Hold flat and turn slowly</div></div>
      </div>
    </div>
  </div></div>
</body></html>
