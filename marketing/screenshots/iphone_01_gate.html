<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1320px; height:2868px; overflow:hidden; }
  body {
    font-family:'Inter',-apple-system,sans-serif;
    /* Calm Minimal background */
    background:
      radial-gradient(120% 80% at 50% -10%, #eef1e7 0%, #f8f7f2 55%, #f1f0ea 100%);
    display:flex; flex-direction:column; align-items:center;
    padding:150px 90px 0;
  }
  .headline { font-size:96px; font-weight:800; color:#2f4733; letter-spacing:-2px; text-align:center; line-height:1.04; }
  .sub { margin-top:30px; font-size:46px; font-weight:500; color:#6e7468; text-align:center; }
  /* Phone */
  .phone { margin-top:120px; width:1020px; height:2120px; background:#11130f; border-radius:120px;
           padding:22px; box-shadow:0 60px 140px rgba(60,70,40,.28); }
  .screen { width:100%; height:100%; background:#fbfbf9; border-radius:100px; overflow:hidden; position:relative; display:flex; flex-direction:column; }
  .island { position:absolute; top:34px; left:50%; transform:translateX(-50%); width:330px; height:78px; background:#11130f; border-radius:44px; z-index:5; }
  .statusbar { display:flex; justify-content:space-between; align-items:center; padding:40px 70px 0; font-size:34px; font-weight:600; color:#2a2e28; }
  .gatebody { flex:1; display:flex; flex-direction:column; align-items:center; padding:150px 70px 0; }
  .gatetag { font-size:30px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:#7c8a6e; }
  .ayah { margin-top:70px; font-family:'Amiri',serif; font-size:128px; line-height:2.0; color:#2a2e28; text-align:center; direction:rtl; }
  .translation { margin-top:54px; font-size:46px; line-height:1.7; color:#5b6157; text-align:center; max-width:760px; }
  .ref { margin-top:34px; font-size:34px; color:#9aa08f; font-style:italic; }
  .spacer { flex:1; }
  .timerwrap { display:flex; flex-direction:column; align-items:center; margin-bottom:40px; }
  .ring { width:230px; height:230px; border-radius:50%; border:14px solid #e6e9dd; border-top-color:#4f6048; border-right-color:#4f6048;
          transform:rotate(35deg); display:flex; align-items:center; justify-content:center; }
  .ring span { transform:rotate(-35deg); font-size:64px; font-weight:700; color:#2f4733; }
  .unlock { width:100%; margin-bottom:80px; background:#2f4733; color:#fff; text-align:center; padding:54px; border-radius:42px; font-size:50px; font-weight:600; }
</style>
</head>
<body>
  <div class="headline">Pause before<br>you scroll</div>
  <div class="sub">A moment with the Qur'an before social media opens.</div>

  <div class="phone">
    <div class="screen">
      <div class="island"></div>
      <div class="statusbar"><span>9:41</span><span>􀙇 􀛨 􀋨</span></div>
      <div class="gatebody">
        <div class="gatetag">Set your niyyah</div>
        <div class="ayah">إِنَّ مَعَ الْعُسْرِ يُسْرًا</div>
        <div class="translation">"Indeed, with hardship comes ease."</div>
        <div class="ref">Surah Ash-Sharh · 94:6</div>
        <div class="spacer"></div>
        <div class="timerwrap">
          <div class="ring"><span>2:13</span></div>
        </div>
        <div class="unlock">Continue to Instagram</div>
      </div>
    </div>
  </div>
</body>
</html>
