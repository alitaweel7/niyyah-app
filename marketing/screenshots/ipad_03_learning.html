<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared_ipad.css">
<style>
  .title { font-size:58px; font-weight:700; color:#2f4733; padding:14px 80px 0; }
  .body { flex:1; display:flex; flex-direction:column; align-items:center; padding:0 80px; }
  .ring { margin-top:120px; width:760px; height:760px; border-radius:50%;
          background:conic-gradient(#4f6048 0 12%, #e6e9dd 12% 100%);
          display:flex; align-items:center; justify-content:center; }
  .ring .inner { width:600px; height:600px; border-radius:50%; background:#fbfbf9;
                 display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .pct { font-size:190px; font-weight:800; color:#2f4733; line-height:1; }
  .pctlbl { font-size:54px; color:#6e7468; margin-top:18px; }
  .stats { display:flex; gap:44px; margin-top:110px; width:100%; max-width:1180px; }
  .stat { flex:1; padding:56px 0; text-align:center; }
  .statnum { font-size:92px; font-weight:800; color:#2f4733; }
  .statlbl { font-size:40px; color:#6e7468; margin-top:14px; }
  .seclabel { align-self:flex-start; margin-left:auto; margin-right:auto; width:100%; max-width:1180px;
              font-size:44px; font-weight:700; color:#2a2e28; margin-top:90px; margin-bottom:34px; }
  .chips { display:flex; flex-wrap:wrap; gap:30px; width:100%; max-width:1180px; }
  .chip { display:flex; align-items:center; gap:20px; background:#eef1e7; color:#3a4034;
          border-radius:46px; padding:30px 48px; font-size:44px; font-weight:500; }
  .chip .ck { color:#4f6048; font-size:48px; }
</style></head>
<body class="light">
  <div class="headline">Your journey through the Qur'an</div>
  <div class="sub">Every gate moves you forward — see how far you've come.</div>
  <div class="pad"><div class="screen">
    <div class="cam"></div>
    <div class="statusbar"><span>9:41</span><span>iPad&nbsp;&nbsp;􀙇 􀛨 􀋨</span></div>
    <div class="title">My Learning</div>
    <div class="body">
      <div class="ring"><div class="inner">
        <div class="pct">12%</div>
        <div class="pctlbl">of the Qur'an</div>
      </div></div>
      <div class="stats">
        <div class="stat card"><div class="statnum">748</div><div class="statlbl">Ayahs read</div></div>
        <div class="stat card"><div class="statnum">9</div><div class="statlbl">Surahs done</div></div>
      </div>
      <div class="seclabel">Completed Surahs</div>
      <div class="chips">
        <span class="chip"><span class="ck">✓</span>Al-Fatiha</span>
        <span class="chip"><span class="ck">✓</span>Al-Ikhlas</span>
        <span class="chip"><span class="ck">✓</span>Al-Falaq</span>
        <span class="chip"><span class="ck">✓</span>An-Nas</span>
        <span class="chip"><span class="ck">✓</span>Al-Kawthar</span>
      </div>
    </div>
  </div></div>
</body></html>
