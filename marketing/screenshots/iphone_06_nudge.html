<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="_shared.css">
<style>
  .gatebody { flex:1; display:flex; flex-direction:column; align-items:center; padding:54px 70px 0; }
  .nudge { width:100%; display:flex; align-items:center; gap:26px; background:#1a3a2a;
           border:2px solid #D8B87855; border-radius:34px; padding:34px 38px; }
  .nudge .moon { font-size:54px; }
  .nudge .ntxt { font-size:38px; font-weight:700; color:#e3c98f; }
  .nudge .nsub { font-size:32px; color:#b3aa92; margin-top:6px; }
  .gatetag { margin-top:60px; font-size:30px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:#8fa07e; }
  .ayah { margin-top:54px; font-family:'Amiri',serif; font-size:120px; line-height:2.0; color:#f0ead8; text-align:center; direction:rtl; }
  .translation { margin-top:48px; font-size:46px; line-height:1.7; color:#cfc7b0; text-align:center; max-width:780px; }
  .ref { margin-top:30px; font-size:34px; color:#9aa890; font-style:italic; }
  .spacer { flex:1; }
  .ring { width:230px; height:230px; border-radius:50%; border:14px solid #1c3a2a; border-top-color:#D8B878; border-right-color:#D8B878;
          transform:rotate(40deg); display:flex; align-items:center; justify-content:center; margin-bottom:44px; }
  .ring span { transform:rotate(-40deg); font-size:64px; font-weight:700; color:#e3c98f; }
  .unlock { width:100%; margin-bottom:80px; background:#D8B878; color:#0c2019; text-align:center; padding:54px; border-radius:42px; font-size:50px; font-weight:700; }
</style></head>
<body class="dark">
  <div class="headline">The right nudge<br>at the right time</div>
  <div class="sub">Prayer-aware reminders, woven into your day.</div>
  <div class="phone"><div class="screen">
    <div class="island"></div>
    <div class="statusbar"><span>9:41</span><span>􀙇 􀛨 􀋨</span></div>
    <div class="gatebody">
      <div class="nudge">
        <span class="moon">🌙</span>
        <div><div class="ntxt">Maghrib is in 8 minutes</div>
        <div class="nsub">Pray first — then continue.</div></div>
      </div>
      <div class="gatetag">Set your niyyah</div>
      <div class="ayah">وَأَقِمِ الصَّلَاةَ لِذِكْرِي</div>
      <div class="translation">"And establish prayer for My remembrance."</div>
      <div class="ref">Surah Ta-Ha · 20:14</div>
      <div class="spacer"></div>
      <div class="ring"><span>1:46</span></div>
      <div class="unlock">Continue to TikTok</div>
    </div>
  </div></div>
</body></html>
