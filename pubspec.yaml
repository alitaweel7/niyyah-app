name: aya_unlock
description: "Set your niyyah before you scroll — a spiritual app that gates social media behind Quran and Dua reading."
publish_to: 'none'
version: 1.1.0+8

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  drift_flutter: ^0.2.7
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.4
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  intl: ^0.20.2
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.1
  http: ^1.6.0
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  timezone: ^0.9.4
  adhan_dart: ^1.2.0
  flutter_timezone: ^5.1.0
  flutter_compass: ^0.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  freezed: ^2.5.8
  json_serializable: ^6.9.3
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

# App icon configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#4F5D45"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 26

# Splash screen configuration
flutter_native_splash:
  color: "#F8F7F4"
  image: "assets/images/app_icon.png"
  color_dark: "#2A2D26"
  image_dark: "assets/images/app_icon.png"
  android_12:
    color: "#F8F7F4"
    icon_background_color: "#F8F7F4"
    image: "assets/images/app_icon_foreground.png"
    color_dark: "#2A2D26"
    icon_background_color_dark: "#2A2D26"
    image_dark: "assets/images/app_icon_foreground.png"

flutter:
  uses-material-design: true

  assets:
    - assets/quran/
    - assets/fonts/
    - assets/images/

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf
